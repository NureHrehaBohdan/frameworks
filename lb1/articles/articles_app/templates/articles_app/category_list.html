{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Categories</title>
    <link rel="stylesheet" href="{% static 'articles_app/style.css' %}">
</head>
<body>

<h1>Categories</h1>

<ul>
    {% for category in categories %}
        <li>
            <a href="/categories/{{ category.id }}/articles/">
                {{ category.name }}
            </a>—
            {{ category.articles.count }} articles
        </li>
    {% endfor %}
</ul>

</body>
</html>
